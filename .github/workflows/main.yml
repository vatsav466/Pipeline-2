name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # 1. LINT + UNIT TESTS
  # ---------------------------------------------------------
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          # Repo's eslint config is committed as "eslintrc.cjs" (no leading dot),
          # which ESLint 8 won't auto-discover. Point at it explicitly, falling
          # back to the dotted name if that's what's present.
          if [ -f ".eslintrc.cjs" ]; then
            CONFIG=".eslintrc.cjs"
          elif [ -f "eslintrc.cjs" ]; then
            CONFIG="eslintrc.cjs"
          else
            echo "No eslintrc.cjs config file found in repo root!" >&2
            exit 1
          fi
          echo "Using ESLint config: $CONFIG"
          npx eslint . --ext ts,tsx --config "$CONFIG" --report-unused-disable-directives --max-warnings 0

      - name: Run unit tests with coverage
        run: npm run test -- --coverage || echo "No unit test script found, skipping"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------
  # 2. BUILD (with caching for speed)
  # ---------------------------------------------------------
  build:
    name: Build App
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Vite build cache
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Report bundle size
        run: |
          echo "### Build Output Size" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------
  # 3. E2E + VISUAL REGRESSION TESTING (Playwright)
  # ---------------------------------------------------------
  e2e-and-visual-tests:
    name: E2E & Visual Regression (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Serve built app
        run: |
          npx serve -s dist -l 4173 &
          npx wait-on http://localhost:4173

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:4173

      - name: Run visual regression tests
        run: npx playwright test --grep @visual
        continue-on-error: false

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------
  # 4. DOCKER BUILD & PUSH TO CONTAINER REGISTRY (GHCR)
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Build & Push Docker Image
    needs: e2e-and-visual-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 5. DEPLOY
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy new image
        run: |
          echo "Deploying image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Replace this with your actual deploy step, e.g.:
          #   - SSH into your server and `docker pull` + `docker compose up -d`
          #   - Trigger a redeploy on Render/Railway/Fly.io via their CLI or webhook
          #   - kubectl set image deployment/... on a k8s cluster
          echo "Add your deployment command here."
