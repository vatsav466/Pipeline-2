name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_PORT: '5378'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # 1. LINT + UNIT TESTS
  # ---------------------------------------------------------
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          if [ -f ".eslintrc.cjs" ]; then
            CONFIG=".eslintrc.cjs"
          elif [ -f "eslintrc.cjs" ]; then
            CONFIG="eslintrc.cjs"
          else
            echo "No eslintrc.cjs config file found in repo root!" >&2
            exit 1
          fi
          echo "Using ESLint config: $CONFIG"
          npx eslint . --ext ts,tsx --config "$CONFIG" --report-unused-disable-directives --max-warnings 0

      - name: Report ESLint outcome
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::warning::ESLint reported errors — see the 'Run ESLint' step above for details. Continuing pipeline anyway."
          echo "### ⚠️ ESLint found issues" >> $GITHUB_STEP_SUMMARY
          echo "The lint step failed but was allowed to continue. Check the 'Run ESLint' logs above." >> $GITHUB_STEP_SUMMARY

      - name: Run unit tests with coverage
        run: npm run test -- --coverage || echo "No unit test script found, skipping"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------
  # 2. BUILD (with caching for speed)
  # ---------------------------------------------------------
  build:
    name: Build App
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Vite build cache
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "::error::dist/index.html not found — build did not produce expected output!"
            exit 1
          fi
          echo "### Build Output Size" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------
  # 3. E2E + VISUAL REGRESSION TESTING (Playwright)
  # ---------------------------------------------------------
  e2e-and-visual-tests:
    name: E2E & Visual Regression (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Serve built app
        run: |
          npx serve -s dist -l 4173 &
          npx wait-on http://localhost:4173

      - name: Run Playwright E2E tests
        env:
          BASE_URL: http://localhost:4173
        run: |
          TEST_COUNT=$(npx playwright test --list 2>/dev/null | grep -c "›" || true)
          if [ "$TEST_COUNT" -eq 0 ]; then
            echo "::warning::No Playwright E2E tests found yet — skipping this step."
            echo "### ⚠️ No E2E tests found" >> $GITHUB_STEP_SUMMARY
          else
            npx playwright test
          fi

      - name: Run visual regression tests
        run: |
          VISUAL_COUNT=$(npx playwright test --grep @visual --list 2>/dev/null | grep -c "›" || true)
          if [ "$VISUAL_COUNT" -eq 0 ]; then
            echo "::warning::No visual regression tests (@visual tag) found yet — skipping this step."
            echo "### ⚠️ No visual regression tests found" >> $GITHUB_STEP_SUMMARY
          else
            npx playwright test --grep @visual
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------
  # 4. DOCKER BUILD & PUSH TO CONTAINER REGISTRY (GHCR)
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Build & Push Docker Image
    needs: e2e-and-visual-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 5. DEPLOY (SSH into the server, pull latest image, restart container)
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy new image over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -e
            echo "Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "Stopping old container (if running)..."
            docker stop pipeline-ui || true
            docker rm pipeline-ui || true

            echo "Starting new container..."
            docker run -d \
              --name pipeline-ui \
              --restart unless-stopped \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment complete. Verifying container is up..."
            sleep 3
            docker ps --filter "name=pipeline-ui"
