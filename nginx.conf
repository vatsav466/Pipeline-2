server {
    listen 5378;
    server_name localhost;

    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the built React/Vite static files.
    # try_files falls back to index.html so client-side routing
    # (React Router etc.) works instead of 404ing on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /digitaltwin-images/ {
        alias /opt/digitaltwin_images/;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";

        types {
            model/gltf-binary glb;
        }
    }

    location /api {
        proxy_pass https://13.126.249.159/api;

        # Needed since backend is an IP over HTTPS with (likely) a self-signed
        # or mismatched cert — remove if the cert is valid for this IP.
        proxy_ssl_verify off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    location /api123 {
        proxy_pass https://novex.hpcl.co.in/api;

        # Needed so the correct SNI/vhost cert is presented by the upstream
        proxy_ssl_server_name on;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host novex.hpcl.co.in;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: serve a local fallback page if an upstream API fails
    error_page 502 /custom_502.html;

    location = /custom_502.html {
        root /usr/share/nginx/html;
        internal;
    }
}
