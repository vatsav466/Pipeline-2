server {
    listen 5378;
    server_name localhost;

    client_max_body_size 100M;

    location / {
        proxy_buffers 8 1024k;
        proxy_buffer_size 1024k;
        proxy_pass http://localhost:5174;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /digitaltwin-images/ {
        alias /opt/digitaltwin_images/;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";

        types {
            model/gltf-binary glb;
        }
    }

    location /api {
        # proxy_pass https://140.245.238.142/api/;
        # proxy_pass https://novex.hpcl.co.in/api/;
        # proxy_pass https://192.168.96.97:8080;
        proxy_pass https://13.126.249.159/api;
        # proxy_pass https://novex-dev.algofusiontech.com/api;

        # Needed since backend is an IP over HTTPS with (likely) a self-signed
        # or mismatched cert — remove if the cert is valid for this IP.
        proxy_ssl_verify off;

        # For WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    location /api123 {
        # proxy_pass https://140.245.238.142/api/;
        proxy_pass https://novex.hpcl.co.in/api;

        # Needed so the correct SNI/vhost cert is presented by the upstream
        proxy_ssl_server_name on;

        # For WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host novex.hpcl.co.in;

        # proxy_set_header Host datafusion.sirobilt.com;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: serve a local fallback page if backend fails
    error_page 502 /custom_502.html;

    location = /custom_502.html {
        root /usr/share/nginx/html;  # Adjust to your actual file path
        internal;
    }
}
